<!DOCTYPE html>
<html lang="en">

<head>
  <title>T22-the DOM</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: skyblue;
      font-family: Arial, sans-serif;
    }

    #game {
      position: relative;
      width: 400px;
      height: 600px;
      margin: auto;
      background: #555;
      overflow: hidden;
      border: 4px solid black;
    }

    .lane {
      position: absolute;
      width: 4px;
      height: 100%;
      background: white;
    }

    #lane1 { left: 133px; }
    #lane2 { left: 266px; }

    #player {
      position: absolute;
      width: 50px;
      height: 50px;
      background: orange;
      bottom: 50px;
      left: 40px;
      border-radius: 10px;
    }

    .obstacle {
      position: absolute;
      width: 50px;
      height: 50px;
      background: red;
      top: -50px;
    }

    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 24px;
      font-weight: bold;
      z-index: 10;
    }
  </style>

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <div id="game">
    <div id="score">Score: 0</div>

    <div class="lane" id="lane1"></div>
    <div class="lane" id="lane2"></div>

    <div id="player"></div>
  </div>

  <script src="../t22_the_DOM.js"></script>

</body>

</html>

  END OF T22_THE_DOM.HTML
**************************************************************-->
